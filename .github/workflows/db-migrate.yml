name: DB Migrate (MVP)

on:
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: db-migrate-mvp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect migration SQL and build manifest
        id: collect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi

          echo "Diff range: ${BASE_SHA}...${HEAD_SHA}"
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- "apps/api/migrations" | sort -u)

          sql_files=()
          for file in "${changed_files[@]}"; do
            if [[ "$file" == *.sql && -f "$file" ]]; then
              sql_files+=("$file")
            fi
          done

          if [[ ${#sql_files[@]} -eq 0 ]]; then
            echo "No changed migration SQL files found."
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${sql_files[@]}" > "$RUNNER_TEMP/migration-files.txt"

          manifest_path="$RUNNER_TEMP/nexu-db-migration-manifest.json"
          MIGRATION_FILE_LIST="$RUNNER_TEMP/migration-files.txt" MANIFEST_PATH="$manifest_path" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          const listPath = process.env.MIGRATION_FILE_LIST;
          const manifestPath = process.env.MANIFEST_PATH;

          if (!listPath || !manifestPath) {
            throw new Error("Missing required environment variables for manifest generation.");
          }

          const files = fs
            .readFileSync(listPath, "utf8")
            .split("\n")
            .map((entry) => entry.trim())
            .filter((entry) => entry.length > 0)
            .sort();

          const manifest = {
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF,
            sha: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID,
            eventName: process.env.GITHUB_EVENT_NAME,
            generatedAt: new Date().toISOString(),
            files: files.map((filePath) => {
              const sql = fs.readFileSync(filePath, "utf8");
              const sha256 = crypto.createHash("sha256").update(sql).digest("hex");
              return {
                path: filePath,
                sha256,
                sql,
              };
            }),
          };

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`, "utf8");
          NODE

          echo "Detected migration files:"
          printf ' - %s\n' "${sql_files[@]}"

          echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"

      - name: Upload migration manifest
        if: steps.collect.outputs.has_migrations == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nexu-db-migration-manifest
          path: ${{ steps.collect.outputs.manifest_path }}

      - name: Run nexu-db migrate apply (expected to fail before CLI exists)
        if: steps.collect.outputs.has_migrations == 'true'
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          echo "Running: nexu-db migrate apply --manifest ${{ steps.collect.outputs.manifest_path }}"
          nexu-db migrate apply --manifest "${{ steps.collect.outputs.manifest_path }}"

      - name: Note expected failure
        if: steps.collect.outputs.has_migrations == 'true' && steps.apply.outcome == 'failure'
        run: |
          echo "nexu-db CLI migrate apply is not available yet; failure is expected in MVP test stage."
