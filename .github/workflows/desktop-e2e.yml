name: Desktop E2E

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'E2E mode'
        required: false
        default: 'model'
        type: choice
        options: [smoke, login, model, update, resilience, full]
      source:
        description: 'Artifact source'
        required: false
        default: 'download'
        type: choice
        options:
          - download   # Download published build (nightly/beta/stable)
          - build      # Build unsigned from current branch
      channel:
        description: 'Channel (only for download source)'
        required: false
        default: 'nightly'
        type: choice
        options: [nightly, beta, stable]
      coverage:
        description: 'Enable precise coverage collection (build source only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    # Run nightly at 03:00 UTC (11:00 CST)
    - cron: '0 3 * * *'

env:
  RELEASE_BASE: https://desktop-releases.nexu.io

jobs:
  validate-inputs:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate coverage input
        if: github.event.inputs.coverage == 'true' && github.event.inputs.source != 'build'
        run: |
          echo "coverage=true requires source=build for precise path remapping and per-run source map parity."
          echo "Use source=build for coverage runs, or set coverage=false when testing downloaded artifacts."
          exit 1

  # --------------------------------------------------------------------------
  # Option A: Build unsigned from current branch
  # --------------------------------------------------------------------------
  build:
    needs: [validate-inputs]
    if: always() && github.event.inputs.source == 'build' && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned desktop (arm64)
        run: |
          rm -f apps/desktop/release/*.dmg apps/desktop/release/*.zip
          pnpm dist:mac:unsigned:arm64

      - name: Copy build artifacts to E2E
        run: |
          mkdir -p e2e/desktop/artifacts
          rm -f e2e/desktop/artifacts/*.dmg e2e/desktop/artifacts/*.zip
          cp apps/desktop/release/*.dmg e2e/desktop/artifacts/
          cp apps/desktop/release/*.zip e2e/desktop/artifacts/
          echo "Artifacts:"
          ls -lh e2e/desktop/artifacts/

      - name: Collect coverage remap artifacts
        if: github.event.inputs.coverage == 'true'
        run: |
          mkdir -p e2e/desktop/artifacts/source-maps/dist
          mkdir -p e2e/desktop/artifacts/source-maps/dist-electron/preload
          cp -R apps/desktop/dist/. e2e/desktop/artifacts/source-maps/dist/
          cp -R apps/desktop/dist-electron/preload/. e2e/desktop/artifacts/source-maps/dist-electron/preload/

      - name: Write coverage build manifest
        if: github.event.inputs.coverage == 'true'
        run: |
          node -e "const fs = require('node:fs'); const path = require('node:path'); const manifestPath = path.join('e2e', 'desktop', 'artifacts', 'coverage-build-manifest.json'); const manifest = { gitSha: process.env.GITHUB_SHA, workflowRunId: process.env.GITHUB_RUN_ID, mode: process.env.NEXU_DESKTOP_E2E_MODE, source: 'build', coverageEnabled: true, builtAt: new Date().toISOString(), pathNormalizationVersion: 1, sourceMaps: ['source-maps/dist/**', 'source-maps/dist-electron/preload/**'] }; fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');"
        env:
          NEXU_DESKTOP_E2E_MODE: ${{ github.event.inputs.mode || 'model' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/desktop/artifacts/
          retention-days: 3

  # --------------------------------------------------------------------------
  # E2E test
  # --------------------------------------------------------------------------
  e2e:
    needs: [validate-inputs, build]
    if: always() && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped') && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: e2e/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm install

      # --- Download source ---
      - name: Download published artifacts
        if: github.event.inputs.source != 'build'
        env:
          CHANNEL: ${{ github.event.inputs.channel || 'nightly' }}
          NEXU_DESKTOP_E2E_DMG_URL: ${{ env.RELEASE_BASE }}/${{ github.event.inputs.channel || 'nightly' }}/arm64/nexu-latest-${{ github.event.inputs.channel || 'nightly' }}-mac-arm64.dmg
          NEXU_DESKTOP_E2E_ZIP_URL: ${{ env.RELEASE_BASE }}/${{ github.event.inputs.channel || 'nightly' }}/arm64/nexu-latest-${{ github.event.inputs.channel || 'nightly' }}-mac-arm64.zip
        run: |
          echo "Channel: $CHANNEL"
          npm run download

      # --- Build source ---
      - name: Download build artifacts
        if: github.event.inputs.source == 'build'
        uses: actions/download-artifact@v4
        with:
          name: desktop-e2e-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/desktop/artifacts/

      - name: Verify artifacts
        run: |
          echo "Artifacts:"
          ls -lh artifacts/
          test -f artifacts/*.dmg || { echo "ERROR: No DMG found"; exit 1; }
          test -f artifacts/*.zip || { echo "ERROR: No ZIP found"; exit 1; }

      - name: Run desktop E2E
        env:
          NEXU_DESKTOP_E2E_SKIP_CODESIGN: ${{ github.event.inputs.source == 'build' && 'true' || 'false' }}
          NEXU_DESKTOP_E2E_COVERAGE: ${{ github.event.inputs.coverage == 'true' && '1' || '0' }}
          NEXU_DESKTOP_E2E_COVERAGE_RUN_ID: desktop-e2e-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.inputs.mode || 'model' }}
          NEXU_DESKTOP_E2E_GIT_SHA: ${{ github.sha }}
          NEXU_DESKTOP_E2E_SOURCE: ${{ github.event.inputs.source || 'download' }}
          NEXU_DESKTOP_E2E_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: bash scripts/run-e2e.sh "${{ github.event.inputs.mode || 'model' }}"

      - name: Merge desktop E2E coverage
        if: always() && github.event.inputs.coverage == 'true'
        run: npm run coverage:merge

      - name: Write desktop E2E coverage summary
        if: always() && github.event.inputs.coverage == 'true'
        run: npm run coverage:report

      - name: Upload desktop E2E coverage artifacts
        if: always() && github.event.inputs.coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-coverage-${{ github.event.inputs.mode || 'model' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            e2e/desktop/captures/coverage/
            e2e/desktop/artifacts/coverage-build-manifest.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload desktop E2E coverage to Codecov
        if: ${{ !cancelled() && github.event.inputs.coverage == 'true' && hashFiles('e2e/desktop/captures/coverage/lcov.info') != '' }}
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: e2e/desktop/captures/coverage/lcov.info
          flags: desktop-e2e
          name: desktop-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          fail_ci_if_error: true
          verbose: true
          os: macos

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-${{ github.event.inputs.source || 'download' }}-${{ github.event.inputs.channel || 'nightly' }}-${{ github.event.inputs.mode || 'model' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            e2e/desktop/captures/
            !e2e/desktop/captures/coverage/**
          if-no-files-found: warn
          retention-days: 14
